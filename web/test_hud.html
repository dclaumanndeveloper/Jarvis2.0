<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HUD Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud-container">
        <div class="scanlines"></div>
        <div class="noise"></div>
        <div class="hex-grid"></div>
        
        <div id="reactor-canvas-container">
            <div class="arc-reactor">
                <div class="reactor-core"></div>
                <div class="reactor-ring ring-outer"></div>
                <div class="reactor-ring ring-mid"></div>
                <div class="reactor-ring ring-inner"></div>
                <div class="reactor-lines">
                    <div class="reactor-line" style="transform: rotate(0deg)"></div>
                    <div class="reactor-line" style="transform: rotate(30deg)"></div>
                    <div class="reactor-line" style="transform: rotate(60deg)"></div>
                    <div class="reactor-line" style="transform: rotate(90deg)"></div>
                    <div class="reactor-line" style="transform: rotate(120deg)"></div>
                    <div class="reactor-line" style="transform: rotate(150deg)"></div>
                </div>
            </div>
        </div>
        
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        
        <header id="hud-header">
            <div class="system-title">J.A.R.V.I.S. <span class="version">v2.0</span></div>
            <div id="current-time">00:00:00</div>
        </header>
        
        <aside class="panel left-panel">
            <div class="panel-header">SYSTEM ANALYTICS</div>
            <div class="metrics-container" id="left-metrics"></div>
        </aside>
        
        <aside class="panel right-panel">
            <div class="panel-header">NEURAL STATUS</div>
            <div class="metrics-container" id="right-metrics"></div>
        </aside>
        
        <footer id="hud-footer">
            <canvas id="voice-visualizer"></canvas>
            <div id="response-box">
                <div class="label">>> SYSTEM RESPONSE:</div>
                <div id="response-text">INITIALIZING HUD...</div>
            </div>
            <div id="ticker-wrap">
                <div id="ticker">SYSTEMS ONLINE // TARGET LOCK: NIL // POWER STABLE: 100%</div>
            </div>
        </footer>
        
        <div id="status-overlay">
            <div id="status-text">INITIALIZING</div>
        </div>
    </div>
    
    <script>
        // Simple test clock
        function updateClock() {
            const el = document.getElementById('current-time');
            if (el) {
                const now = new Date();
                el.innerText = now.toLocaleTimeString('pt-BR', { hour12: false });
                console.log('Clock updated:', el.innerText);
            } else {
                console.error('Clock element not found!');
            }
        }
        
        updateClock();
        setInterval(updateClock, 1000);
        console.log('Test HUD loaded');
    </script>
</body>
</html>
